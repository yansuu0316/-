<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>消失的女孩</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="phone-frame">
  <!-- 状态栏 -->
  <div id="status-bar">
    <span class="time">15:42</span>
    <span class="icons">
      <span class="signal">●●●○</span>
      <span class="wifi">⚟</span>
      <span class="battery">▊▊▊░ 67%</span>
    </span>
  </div>

  <!-- 引入序列 -->
  <div id="intro-screen" class="screen active">
    <div id="intro-text"></div>
    <div id="intro-tap-hint" class="hidden">点击继续</div>
  </div>

  <!-- 锁屏 -->
  <div id="lock-screen" class="screen">
    <div class="lock-date">2015年5月17日 星期日</div>
    <div class="lock-time-display">15:42</div>
    <div class="lock-prompt">输入密码解锁</div>
    <div class="lock-dots">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
    <div class="lock-input-display"></div>
    <div class="numpad">
      <button class="num-btn" data-num="1">1</button>
      <button class="num-btn" data-num="2">2</button>
      <button class="num-btn" data-num="3">3</button>
      <button class="num-btn" data-num="4">4</button>
      <button class="num-btn" data-num="5">5</button>
      <button class="num-btn" data-num="6">6</button>
      <button class="num-btn" data-num="7">7</button>
      <button class="num-btn" data-num="8">8</button>
      <button class="num-btn" data-num="9">9</button>
      <button class="num-btn" data-num="0">0</button>
      <button class="num-btn delete-btn" data-num="del">⌫</button>
    </div>
  </div>

  <!-- 主屏幕 -->
  <div id="home-screen" class="screen">
    <div class="home-date">5月17日 星期日</div>
    <div class="app-grid">
      <div class="app-icon" data-app="chat">
        <div class="icon-img chat-icon">💬</div>
        <span>绿泡泡</span>
        <div class="app-badge hidden" id="chat-badge"></div>
      </div>
      <div class="app-icon" data-app="photos">
        <div class="icon-img photos-icon">🖼</div>
        <span>相册</span>
      </div>
      <div class="app-icon" data-app="notes">
        <div class="icon-img notes-icon">📝</div>
        <span>备忘录</span>
      </div>
      <div class="app-icon" data-app="browser">
        <div class="icon-img browser-icon">🌐</div>
        <span>浏览器</span>
      </div>
      <div class="app-icon" data-app="shop">
        <div class="icon-img shop-icon">🔪</div>
        <span>拼刀刀</span>
      </div>
      <div class="app-icon" data-app="fortune">
        <div class="icon-img fortune-icon">🔮</div>
        <span>星梦女巫</span>
      </div>
      <div class="app-icon locked-app" data-app="weibo" id="weibo-icon">
        <div class="icon-img weibo-icon-img">📢</div>
        <span>围脖 🔒</span>
      </div>
    </div>
  </div>

  <!-- 绿泡泡主界面 -->
  <div id="app-chat" class="screen app-screen">
    <div class="app-header">
      <button class="back-btn">←</button>
      <span class="app-title">绿泡泡</span>
    </div>
    <div class="chat-list"></div>
  </div>

  <!-- 聊天对话界面 -->
  <div id="chat-conversation" class="screen app-screen">
    <div class="app-header">
      <button class="back-btn">←</button>
      <span class="app-title" id="conv-title"></span>
    </div>
    <div class="conversation-body" id="conv-body"></div>
    <div class="chat-input-area hidden" id="chat-input-area">
      <div class="chat-choices" id="chat-choices"></div>
    </div>
  </div>

  <!-- 相册 -->
  <div id="app-photos" class="screen app-screen">
    <div class="app-header">
      <button class="back-btn">←</button>
      <span class="app-title">相册</span>
    </div>
    <div class="photos-content" id="photos-content"></div>
  </div>

  <!-- 相册密码锁 -->
  <div id="photos-lock" class="hidden">
    <div class="album-lock-overlay">
      <div class="album-lock-box">
        <p>🔒 私密相册</p>
        <p class="lock-hint">请输入6位密码</p>
        <input type="text" id="album-password" maxlength="6" placeholder="______">
        <button id="album-unlock-btn">解锁</button>
        <p class="lock-error hidden" id="album-error">密码错误</p>
      </div>
    </div>
  </div>

  <!-- 备忘录 -->
  <div id="app-notes" class="screen app-screen">
    <div class="app-header">
      <button class="back-btn">←</button>
      <span class="app-title">备忘录</span>
    </div>
    <div class="notes-list" id="notes-list"></div>
  </div>

  <!-- 备忘录详情 -->
  <div id="note-detail" class="screen app-screen">
    <div class="app-header">
      <button class="back-btn">←</button>
      <span class="app-title">备忘录</span>
    </div>
    <div class="note-content" id="note-content"></div>
  </div>

  <!-- 浏览器 -->
  <div id="app-browser" class="screen app-screen">
    <div class="app-header">
      <button class="back-btn">←</button>
      <span class="app-title">浏览器</span>
      <button id="browser-recycle-btn" style="margin-left:auto;background:none;border:none;font-size:18px;cursor:pointer;padding:4px 8px;">🗑</button>
    </div>
    <div class="browser-content" id="browser-content">
      <div class="browser-bar">
        <input type="text" id="browser-url" placeholder="输入网址...">
        <button id="browser-go">前往</button>
      </div>
      <div class="browser-history" id="browser-history">
        <h4>历史记录</h4>
        <div id="history-list"></div>
      </div>
      <div class="browser-page hidden" id="browser-page"></div>
    </div>
  </div>

  <!-- 拼刀刀 -->
  <div id="app-shop" class="screen app-screen">
    <div class="app-header">
      <button class="back-btn">←</button>
      <span class="app-title">拼刀刀</span>
    </div>
    <div class="shop-content" id="shop-content"></div>
  </div>

  <!-- 星梦女巫 -->
  <div id="app-fortune" class="screen app-screen">
    <div class="app-header">
      <button class="back-btn">←</button>
      <span class="app-title">星梦女巫</span>
    </div>
    <div class="fortune-content" id="fortune-content"></div>
  </div>

  <!-- 围脖 -->
  <div id="app-weibo" class="screen app-screen">
    <div class="app-header">
      <button class="back-btn">←</button>
      <span class="app-title">围脖</span>
    </div>
    <div class="weibo-content" id="weibo-content"></div>
  </div>

  <!-- 日历提醒弹窗 -->
  <div id="calendar-alert" class="modal hidden">
    <div class="modal-box">
      <div class="modal-icon">📅</div>
      <div class="modal-title">日历提醒</div>
      <div class="modal-body">5月17日 — 去天台</div>
      <button class="modal-btn" id="dismiss-calendar">知道了</button>
    </div>
  </div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
